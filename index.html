<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Jam Plus Minus Kompen</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Flatpickr untuk Input Tanggal -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <!-- SweetAlert2 untuk Popup -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- Font Modern (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    
    /* Glassmorphism Effect */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
    }
    
    /* Fade In Animation */
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(15px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
  </style>
</head>
<body class="bg-[#F9F6EE] text-gray-800 min-h-screen flex flex-col">

  <!-- ================= SPINNER LOADING ================= -->
  <div id="loadingOverlay" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-white"></div>
  </div>

  <!-- ================= NAVBAR (Global setelah login) ================= -->
  <nav id="globalNav" class="hidden glass shadow-sm px-4 sm:px-6 py-4">
    <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
      <h1 class="text-xl font-extrabold text-gray-800 tracking-tight">JPMK</h1>
      <div class="flex items-center gap-4">
        <span id="userGreeting" class="font-semibold text-gray-700"></span>
        <button onclick="handleLogout()" class="bg-red-500/90 hover:bg-red-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition shadow-sm">Logout</button>
      </div>
    </div>
  </nav>

  <!-- ================= MAIN CONTAINER ================= -->
  <main class="flex-grow flex items-center justify-center p-4">

    <!-- STEP 1: HALAMAN LOGIN -->
    <div id="stepLogin" class="w-full max-w-md glass rounded-3xl p-6 sm:p-10 fade-in">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900">Portal Dosen</h2>
        <p class="text-gray-600 mt-2">Masuk untuk mencatat jam mahasiswa</p>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-5">
          <label class="block text-sm font-semibold mb-2 text-gray-700">Username</label>
          <input type="text" id="username" class="w-full px-4 py-3 border border-gray-300/50 rounded-xl bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required>
        </div>
        <div class="mb-8">
          <label class="block text-sm font-semibold mb-2 text-gray-700">Password</label>
          <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300/50 rounded-xl bg-white/70 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required>
        </div>
        <button type="submit" class="w-full bg-blue-600/90 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-xl">
          Masuk Sekarang
        </button>
      </form>
    </div>

    <!-- STEP 3: INPUT NIM -->
    <div id="stepNim" class="hidden w-full max-w-lg glass rounded-3xl p-6 sm:p-10 fade-in text-center">
      <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Pencarian Mahasiswa</h2>
      <p class="text-gray-600 mb-8">Kategori: <span id="displayKategori" class="font-bold text-blue-600"></span>. Masukkan NIM tujuan.</p>
      <form onsubmit="goToDashboard(event)">
        <div class="flex flex-wrap gap-2 items-center justify-center mb-8">
          <select id="nimYear" class="px-4 py-3 border border-gray-300/50 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white/80 font-medium" required>
            <option value="">Memuat...</option>
          </select>
          <span class="font-bold text-gray-700">-</span>
          <select id="nimCode" class="px-4 py-3 border border-gray-300/50 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white/80 font-medium" required>
            <option value="6">6</option>
            <option value="2">2</option>
          </select>
          <span class="font-bold text-gray-700">-</span>
          <input type="text" id="nimDigits" placeholder="050" maxlength="3" pattern="\d{3}" class="w-24 px-4 py-3 border border-gray-300/50 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white/80 font-medium text-center tracking-widest" required>
        </div>
        <button type="submit" class="w-full bg-blue-600/90 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg mb-4">Lihat Riwayat &rarr;</button>
        <button type="button" onclick="backToStep(2)" class="w-full text-gray-600 hover:text-gray-900 font-medium transition flex items-center justify-center gap-2">
          <span>&larr;</span> Kembali Pilih Kategori
        </button>
      </form>
    </div>

    <!-- STEP 2: PILIH KATEGORI -->
    <div id="stepCategory" class="hidden w-full max-w-4xl glass rounded-3xl p-6 sm:p-10 fade-in text-center">
      <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Pilih Kategori Pencatatan</h2>
      <p class="text-gray-600 mb-8 font-medium">Pilih jenis jam untuk dilanjutkan</p>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <button onclick="selectCategory('Plus')" class="group relative bg-white/60 hover:bg-green-500 border border-green-200/50 p-8 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-2xl hover:-translate-y-1">
          <div class="h-16 w-16 mx-auto bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-4 group-hover:bg-white group-hover:text-green-500 transition">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          </div>
          <h3 class="text-2xl font-extrabold text-gray-800 group-hover:text-white">Jam Plus</h3>
          <p class="text-sm text-gray-500 group-hover:text-green-100 mt-2">Tambahkan catatan jam plus</p>
        </button>
        
        <button onclick="selectCategory('Minus')" class="group relative bg-white/60 hover:bg-red-500 border border-red-200/50 p-8 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-2xl hover:-translate-y-1">
          <div class="h-16 w-16 mx-auto bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4 group-hover:bg-white group-hover:text-red-500 transition">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
          </div>
          <h3 class="text-2xl font-extrabold text-gray-800 group-hover:text-white">Jam Minus</h3>
          <p class="text-sm text-gray-500 group-hover:text-red-100 mt-2">Tambahkan catatan jam minus</p>
        </button>
        
        <button onclick="selectCategory('Kompen')" class="group relative bg-white/60 hover:bg-yellow-500 border border-yellow-200/50 p-8 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-2xl hover:-translate-y-1">
          <div class="h-16 w-16 mx-auto bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mb-4 group-hover:bg-white group-hover:text-yellow-500 transition">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
          <h3 class="text-2xl font-extrabold text-gray-800 group-hover:text-white">Kompen</h3>
          <p class="text-sm text-gray-500 group-hover:text-yellow-100 mt-2">Tambahkan catatan kompensasi</p>
        </button>
      </div>
    </div>

    <!-- STEP 4: DASHBOARD (RIWAYAT & FORM) -->
    <div id="stepDashboard" class="hidden w-full container mx-auto fade-in">
      
      <div class="mb-4">
        <button onclick="backToStep(3)" class="text-sm glass px-4 py-2 rounded-xl font-semibold text-gray-700 hover:bg-white/50 transition flex items-center gap-2">
          <span>&larr;</span> Kembali ke Pencarian NIM
        </button>
      </div>

      <div class="flex flex-col lg:flex-row gap-6">
        <!-- Kolom Riwayat -->
        <div class="w-full lg:w-2/3 glass p-4 sm:p-6 rounded-3xl flex flex-col">
          <div class="flex justify-between items-center mb-4 border-b border-gray-300/30 pb-4">
            <h2 class="text-xl font-extrabold text-gray-800">Riwayat <span id="labelHistoryKategori"></span></h2>
            <div class="text-sm font-semibold bg-gray-200/50 px-3 py-1 rounded-lg">NIM: <span id="labelHistoryNim"></span></div>
          </div>
          
          <div class="overflow-x-auto flex-grow">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-gray-300/50">
                  <th class="p-3 text-sm font-bold text-gray-700">Waktu</th>
                  <th class="p-3 text-sm font-bold text-gray-700">Instruktur</th>
                  <th class="p-3 text-sm font-bold text-gray-700">Nama Mhs</th>
                  <th class="p-3 text-sm font-bold text-gray-700">Section</th>
                  <th class="p-3 text-sm font-bold text-gray-700">Jam</th>
                  <th class="p-3 text-sm font-bold text-gray-700">Tgl Kejadian</th>
                  <th class="p-3 text-sm font-bold text-gray-700">Aktivitas</th>
                </tr>
              </thead>
              <tbody id="historyTableBody" class="text-sm">
                <tr><td colspan="7" class="text-center p-8 text-gray-500 font-medium">Memuat data...</td></tr>
              </tbody>
            </table>
          </div>
          
          <div class="mt-6 text-center">
            <button id="loadMoreBtn" onclick="loadMoreData()" class="hidden bg-white/50 hover:bg-white/80 text-gray-700 px-6 py-2 rounded-xl font-bold transition shadow-sm border border-gray-200/50">
              Tampilkan Lebih Banyak
            </button>
          </div>
        </div>

        <!-- Kolom Form Input -->
        <div class="w-full lg:w-1/3 glass p-5 sm:p-8 rounded-3xl h-fit">
          <h2 class="text-2xl font-extrabold text-gray-800 mb-6 border-b border-gray-300/30 pb-4">Tambah Catatan</h2>
          <form id="addDataForm" onsubmit="handleAddData(event)">
            
            <!-- Headline (Kategori & Instruktur Terkunci) -->
            <div class="flex flex-col sm:flex-row gap-3 mb-4">
              <div class="w-full sm:w-1/2">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Kategori</label>
                <input type="text" id="inputKategori" class="w-full px-4 py-2 rounded-xl bg-gray-200/50 text-gray-700 font-bold outline-none" readonly>
              </div>
              <div class="w-full sm:w-1/2">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Instruktur</label>
                <input type="text" id="inputInstruktur" class="w-full px-4 py-2 rounded-xl bg-gray-200/50 text-gray-700 font-bold outline-none" readonly>
              </div>
            </div>

            <!-- Nama Mahasiswa -->
            <div class="mb-4">
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Nama Mahasiswa</label>
              <input type="text" id="inputNamaMahasiswa" class="w-full px-4 py-3 border border-gray-300/50 rounded-xl bg-white/70 focus:ring-2 focus:ring-blue-500 transition font-medium" required>
            </div>

            <!-- Aktivitas / Keterangan -->
            <div class="mb-4">
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Aktivitas / Keterangan</label>
              <textarea id="inputKeterangan" rows="3" class="w-full px-4 py-3 border border-gray-300/50 rounded-xl bg-white/70 focus:ring-2 focus:ring-blue-500 transition font-medium" required></textarea>
            </div>

            <!-- Jumlah Jam -->
            <div class="mb-4">
              <label id="labelInputJam" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Jumlah Jam</label>
              <input type="number" id="inputJam" min="0.5" step="0.5" class="w-full px-4 py-3 border border-gray-300/50 rounded-xl bg-white/70 focus:ring-2 focus:ring-blue-500 transition font-medium" required>
            </div>

            <!-- Tambahan Jam Kompen (Khusus Minus) -->
            <div id="containerJamKompen" class="mb-4 hidden">
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Jam Kompen (Opsional)</label>
              <input type="number" id="inputJamKompen" min="0.5" step="0.5" class="w-full px-4 py-3 border border-yellow-300/50 bg-yellow-50/70 rounded-xl focus:ring-2 focus:ring-yellow-500 transition font-medium text-gray-900">
            </div>

            <!-- Tanggal Kejadian -->
            <div class="mb-4">
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Tanggal Kejadian</label>
              <input type="text" id="inputTanggalKejadian" class="w-full px-4 py-3 border border-gray-300/50 rounded-xl bg-white/70 focus:ring-2 focus:ring-blue-500 transition font-medium" placeholder="Pilih Tanggal" required>
            </div>

            <!-- Section -->
            <div class="mb-6">
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Section (Jadwal Kuliah)</label>
              <input type="text" id="inputSection" class="w-full px-4 py-3 border border-gray-300/50 rounded-xl bg-white/70 focus:ring-2 focus:ring-blue-500 transition font-medium" required>
            </div>

            <button type="submit" id="btnSubmitData" class="w-full bg-blue-600/90 text-white font-extrabold py-3.5 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-500/30">
              Simpan Data
            </button>
          </form>
        </div>
      </div>
    </div>

  </main>

  <script>
    // URL WEB APP ANDA
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwi6s54z4ydpy2SLwi9Y4OiF_sqUXleRNLb0RJeDdGjU7K5RQJORjyEUQyun9Wj-C0/exec';

    // === STATE APLIKASI ===
    let currentUser = null;
    let currentNim = null;
    let currentKategori = null;
    let historyData = [];
    let currentOffset = 0;
    const limitPerPage = 10;

    // === INISIALISASI ===
    document.addEventListener('DOMContentLoaded', () => {
      flatpickr("#inputTanggalKejadian", {
        enableTime: false,
        dateFormat: "d/m/Y"
      });

      const storedUser = localStorage.getItem('nama_dosen');
      if (storedUser) {
        currentUser = storedUser;
        showStep(2); // Langsung ke form NIM
      } else {
        showStep(1); // Login
      }
      
      // Load Dynamic Years
      loadDynamicYears();
    });

    async function loadDynamicYears() {
      const res = await callGasApi('getAvailableYears', {});
      if (res.success && res.years && res.years.length > 0) {
        const selectYear = document.getElementById('nimYear');
        selectYear.innerHTML = '';
        res.years.forEach(yr => {
          const opt = document.createElement('option');
          opt.value = yr;
          opt.innerText = yr;
          selectYear.appendChild(opt);
        });
      }
    }

    // === UI UTILS ===
    function showLoading() { document.getElementById('loadingOverlay').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

    function hideAllSteps() {
      document.getElementById('stepLogin').classList.add('hidden');
      document.getElementById('stepNim').classList.add('hidden');
      document.getElementById('stepCategory').classList.add('hidden');
      document.getElementById('stepDashboard').classList.add('hidden');
    }

    function showStep(stepNumber) {
      hideAllSteps();
      if (stepNumber === 1) {
        document.getElementById('globalNav').classList.add('hidden');
        document.getElementById('stepLogin').classList.remove('hidden');
      } else {
        document.getElementById('globalNav').classList.remove('hidden');
        document.getElementById('userGreeting').innerText = 'Halo, ' + currentUser;
        
        if (stepNumber === 2) {
          document.getElementById('stepCategory').classList.remove('hidden');
        } else if (stepNumber === 3) {
          document.getElementById('stepNim').classList.remove('hidden');
        } else if (stepNumber === 4) {
          document.getElementById('stepDashboard').classList.remove('hidden');
        }
      }
    }

    function backToStep(step) {
      showStep(step);
    }

    // === CALL API ===
    async function callGasApi(action, payload) {
      const requestBody = { action: action, ...payload };
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(requestBody)
        });
        return await response.json();
      } catch (error) {
        return { success: false, message: error.message };
      }
    }

    // === AUTENTIKASI ===
    async function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      
      showLoading();
      const res = await callGasApi('login', { username: user, password: pass });
      hideLoading();

      if (res.success) {
        currentUser = res.namaDosen;
        localStorage.setItem('nama_dosen', currentUser);
        showStep(2);
      } else {
        Swal.fire({ icon: 'error', title: 'Login Gagal', text: res.message });
      }
    }

    function handleLogout() {
      localStorage.removeItem('nama_dosen');
      currentUser = null;
      currentNim = null;
      currentKategori = null;
      document.getElementById('loginForm').reset();
      showStep(1);
    }

    // === STEP 2: PILIH KATEGORI ===
    function selectCategory(kategori) {
      currentKategori = kategori;
      document.getElementById('displayKategori').innerText = currentKategori;
      showStep(3); // Lanjut ke input NIM
    }

    // === STEP 3: INPUT NIM -> DASHBOARD ===
    function goToDashboard(e) {
      if(e) e.preventDefault();
      const year = document.getElementById('nimYear').value;
      const code = document.getElementById('nimCode').value;
      const digits = document.getElementById('nimDigits').value.trim();
      
      if (digits.length !== 3) {
        return Swal.fire({ icon: 'warning', title: 'Perhatian', text: '3 digit terakhir NIM harus diisi tepat 3 angka!' });
      }

      currentNim = `${year}-${code}-${digits}`;
      
      // Setup Dashboard Form & Label
      document.getElementById('inputKategori').value = currentKategori;
      document.getElementById('inputInstruktur').value = currentUser;
      document.getElementById('labelHistoryNim').innerText = currentNim;
      
      const labelCat = document.getElementById('labelHistoryKategori');
      labelCat.innerText = currentKategori;
      labelCat.className = "text-gray-900 px-2 py-0.5 rounded";
      if (currentKategori === 'Plus') labelCat.classList.add('bg-green-200');
      else if (currentKategori === 'Minus') labelCat.classList.add('bg-red-200');
      else if (currentKategori === 'Kompen') labelCat.classList.add('bg-yellow-200');
      
      // Pewarnaan input berdasarkan Kategori
      const labelInputJam = document.getElementById('labelInputJam');
      const inputJam = document.getElementById('inputJam');
      const containerJamKompen = document.getElementById('containerJamKompen');
      const inputJamKompen = document.getElementById('inputJamKompen');
      
      inputJam.className = "w-full px-4 py-3 border rounded-xl focus:ring-2 transition font-medium text-gray-900";
      
      if (currentKategori === 'Plus') {
        labelInputJam.innerText = 'Jam Plus';
        inputJam.classList.add('bg-green-50/70', 'border-green-300/50', 'focus:ring-green-500');
        containerJamKompen.classList.add('hidden');
      } else if (currentKategori === 'Minus') {
        labelInputJam.innerText = 'Jam Minus';
        inputJam.classList.add('bg-pink-50/70', 'border-pink-300/50', 'focus:ring-pink-500');
        containerJamKompen.classList.remove('hidden');
      } else if (currentKategori === 'Kompen') {
        labelInputJam.innerText = 'Jam Kompen';
        inputJam.classList.add('bg-yellow-50/70', 'border-yellow-300/50', 'focus:ring-yellow-500');
        containerJamKompen.classList.add('hidden');
      }
      
      // Reset Form fields
      document.getElementById('inputSection').value = '';
      document.getElementById('inputJam').value = '';
      inputJamKompen.value = '';
      document.getElementById('inputKeterangan').value = '';

      showStep(4);
      
      // Fetch Data
      currentOffset = 0;
      historyData = [];
      fetchHistoryData();
    }

    // === HISTORY DATA ===
    function loadMoreData() {
      currentOffset += limitPerPage;
      fetchHistoryData(true);
    }

    async function fetchHistoryData(isLoadMore = false) {
      showLoading();
      const res = await callGasApi('searchData', { nim: currentNim, kategori: currentKategori, offset: currentOffset, limit: limitPerPage });
      hideLoading();

      if (res.success) {
        // Auto-fill nama mahasiswa jika ditemukan
        if (res.studentName) {
          document.getElementById('inputNamaMahasiswa').value = res.studentName;
        } else if (!isLoadMore && !document.getElementById('inputNamaMahasiswa').value) {
          document.getElementById('inputNamaMahasiswa').value = "";
        }

        if (!isLoadMore) historyData = [];
        historyData = historyData.concat(res.data);
        renderHistoryTable(res.data, isLoadMore);

        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (res.hasMore) {
          loadMoreBtn.classList.remove('hidden');
        } else {
          loadMoreBtn.classList.add('hidden');
        }

        if (historyData.length === 0) {
          document.getElementById('historyTableBody').innerHTML = 
            `<tr><td colspan="7" class="text-center p-8 text-gray-500 font-medium">Belum ada riwayat ${currentKategori} untuk NIM ini.</td></tr>`;
        }
      } else {
        Swal.fire({ icon: 'error', title: 'Oops...', text: res.message });
      }
    }

    function renderHistoryTable(data, isLoadMore) {
      const tbody = document.getElementById('historyTableBody');
      if (!isLoadMore) tbody.innerHTML = ''; 

      data.forEach(row => {
        let displayTgl = row.tanggalKejadian;
        if (typeof displayTgl === 'string' && displayTgl.includes('T')) {
          const d = new Date(displayTgl);
          if (!isNaN(d)) {
            displayTgl = d.getDate().toString().padStart(2, '0') + '/' + (d.getMonth() + 1).toString().padStart(2, '0') + '/' + d.getFullYear();
          }
        }
        const tr = document.createElement('tr');
        tr.className = "border-b border-gray-200/50 hover:bg-white/40 transition";
        tr.innerHTML = `
          <td class="p-3 text-xs whitespace-nowrap">${row.timestampStr}</td>
          <td class="p-3 text-xs font-medium">${row.namaInstruktur}</td>
          <td class="p-3 text-xs font-medium">${row.namaMahasiswa}</td>
          <td class="p-3 text-xs">${row.section}</td>
          <td class="p-3 text-sm font-bold text-center text-blue-600">${row.jumlahJam}</td>
          <td class="p-3 text-xs whitespace-nowrap text-gray-600">${displayTgl}</td>
          <td class="p-3 text-xs text-gray-700">${row.keterangan}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // === ADD DATA ===
    async function handleAddData(e) {
      e.preventDefault();
      
      const payload = {
        nim: currentNim,
        kategori: currentKategori,
        namaInstruktur: currentUser,
        namaMahasiswa: document.getElementById('inputNamaMahasiswa').value.trim(),
        section: document.getElementById('inputSection').value.trim(),
        jumlahJam: document.getElementById('inputJam').value,
        jumlahJamKompen: document.getElementById('inputJamKompen').value,
        tanggalKejadian: document.getElementById('inputTanggalKejadian').value,
        keterangan: document.getElementById('inputKeterangan').value.trim()
      };

      showLoading();
      const res = await callGasApi('addData', { data: payload });
      hideLoading();

      if (res.success) {
        Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Data berhasil ditambahkan!', timer: 2000, showConfirmButton: false });
        
        // Hanya reset field yang diperlukan
        document.getElementById('inputSection').value = "";
        document.getElementById('inputJam').value = "";
        document.getElementById('inputJamKompen').value = "";
        document.getElementById('inputKeterangan').value = "";
        // Note: Tanggal TIDAK DIRESET agar bisa diisi beruntun
        
        currentOffset = 0;
        fetchHistoryData(false);
      } else {
        Swal.fire({ icon: 'error', title: 'Gagal Menyimpan', text: res.message });
      }
    }
  </script>
</body>
</html>
